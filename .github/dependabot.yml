version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "dev"
    groups:
      linting:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-*"
      testing:
        patterns:
          - "vitest"
          - "fast-check"
          - "@testing-library/*"
          - "jsdom"
      dependencies:
        exclude-patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-*"
          - "vitest"
          - "fast-check"
          - "@testing-library/*"
          - "jsdom"
